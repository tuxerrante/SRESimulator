---
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^badges/
      - id: check-yaml
        exclude: ^helm/
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict]
        exclude: ^helm/

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--fix]

  - repo: local
    hooks:
      - id: no-push-to-main
        name: Block direct pushes to main
        entry: >-
          bash -c
          'branch=$(git symbolic-ref --short HEAD 2>/dev/null);
          if [ "$branch" = "main" ]; then
          echo "ERROR: Direct push to main is not allowed.";
          echo "Create a feature branch and open a pull request.";
          exit 1;
          fi'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
      - id: npm-audit
        name: npm audit (high/critical)
        entry: bash -c 'cd frontend && npm audit --audit-level=high'
        language: system
        files: frontend/package-lock\.json
        pass_filenames: false
      - id: lockfile-lint
        name: lockfile-lint
        entry: >-
          bash -c
          'cd frontend &&
          npx lockfile-lint
          --path package-lock.json
          --type npm
          --allowed-hosts npm
          --validate-https'
        language: system
        files: frontend/package-lock\.json
        pass_filenames: false
