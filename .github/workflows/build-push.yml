---
name: Build and Push Images

"on":
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: frontend
            context: .
            dockerfile: frontend/Dockerfile
          - component: backend
            context: .
            dockerfile: backend/Dockerfile
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Login to GHCR
        # v4.0.0
        uses: >-
          docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          NAME="sre-simulator-${{ matrix.component }}"
          TAG="${REGISTRY}/${OWNER}/${NAME}:latest"
          echo "tags=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        # v7.0.0
        uses: >-
          docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
