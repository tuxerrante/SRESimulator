---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  direct-push-check:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Flag direct push to main
        env:
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          echo "::warning::Direct push to main detected — use a PR instead."
          echo "Pushed by: ${ACTOR} (${SHA})"

  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        # v6.3.0
        uses: >-
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Update npm
        run: npm install --global "npm@${NPM_VERSION}"

      - name: Ensure SHA-pinned actions
        # v5.0.3
        uses: >-
          zgosalvez/github-actions-ensure-sha-pinned-actions@471d5ace1f08e3c4df1c4c2f7e6341aa75da434a

      - name: Install dependencies
        run: make install

      - name: Validate (lint + typecheck)
        run: make validate

      - name: Check unused exports (hygiene, non-blocking)
        continue-on-error: true
        run: make lint-unused-exports

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        # v6.3.0
        uses: >-
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Update npm
        run: npm install --global "npm@${NPM_VERSION}"

      - name: Install dependencies
        run: make install

      - name: Run tests with coverage
        run: make test

      - name: Compute coverage metadata
        id: coverage
        run: |
          set -euo pipefail
          coverage_pct="$(node -e '
            const fs = require("fs");
            const data = JSON.parse(
              fs.readFileSync("backend/coverage/coverage-summary.json", "utf8")
            );
            process.stdout.write(String(data.total.lines.pct));
          ')"
          coverage_value="$(printf '%.1f' "$coverage_pct")"
          color="red"
          if awk "BEGIN {exit !($coverage_pct >= 90)}"; then
            color="brightgreen"
          elif awk "BEGIN {exit !($coverage_pct >= 80)}"; then
            color="green"
          elif awk "BEGIN {exit !($coverage_pct >= 70)}"; then
            color="yellowgreen"
          elif awk "BEGIN {exit !($coverage_pct >= 60)}"; then
            color="yellow"
          elif awk "BEGIN {exit !($coverage_pct >= 50)}"; then
            color="orange"
          fi
          echo "value=${coverage_value}" >> "$GITHUB_OUTPUT"
          echo "color=${color}" >> "$GITHUB_OUTPUT"
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          summary_line="- Backend line coverage: ${coverage_value}%"
          echo "$summary_line" >> "$GITHUB_STEP_SUMMARY"

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        # v6.3.0
        uses: >-
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Update npm
        run: npm install --global "npm@${NPM_VERSION}"

      - name: Install backend dependencies
        run: make install-backend

      - name: Run integration tests (mock mode)
        run: make test-integration

  integration-test-mssql:
    runs-on: ubuntu-latest
    env:
      MSSQL_SA_PASSWORD: ${{ format('CiRun{0}!aA', github.run_id) }}
    services:
      sqlserver:
        image: mcr.microsoft.com/azure-sql-edge:latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ env.MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd
          "python3 -c \"import socket; s=socket.socket();
          s.settimeout(2); s.connect(('localhost',1433)); s.close()\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        # v6.3.0
        uses: >-
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Update npm
        run: npm install --global "npm@${NPM_VERSION}"

      - name: Install backend dependencies
        run: make install-backend

      - name: Create sresimulator database
        working-directory: backend
        env:
          DB_CONN: >-
            Server=localhost;User Id=sa;
            Password=${{ env.MSSQL_SA_PASSWORD }};
            TrustServerCertificate=true
        run: |
          node -e "
            const sql = require('mssql');
            const q = 'IF DB_ID('+
              String.fromCharCode(39)+
              'sresimulator'+
              String.fromCharCode(39)+
              ') IS NULL CREATE DATABASE sresimulator';
            sql.connect(process.env.DB_CONN)
              .then(p => p.request().query(q)
                .then(() => p.close()))
              .then(() => process.exit(0))
              .catch(e => {
                console.error(e.message);
                process.exit(1);
              });
          "

      - name: Run MSSQL integration tests
        env:
          STORAGE_BACKEND: mssql
          DATABASE_URL: >-
            Server=localhost;Database=sresimulator;User Id=sa;
            Password=${{ env.MSSQL_SA_PASSWORD }};TrustServerCertificate=true
        run: make test-integration

      - name: Smoke startup with MSSQL backend
        env:
          MSSQL_DATABASE_URL: >-
            Server=localhost;Database=sresimulator;User Id=sa;
            Password=${{ env.MSSQL_SA_PASSWORD }};TrustServerCertificate=true
        run: make smoke-backend-mssql

  security:
    runs-on: ubuntu-latest
    env:
      SECURITY_FAIL_LEVEL: high
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        # v6.3.0
        uses: >-
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Update npm
        run: npm install --global "npm@${NPM_VERSION}"

      - name: Install dependencies
        run: make install

      - name: Security checks
        run: make security

      - name: Grype severity gate
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/grype"
          grype_digest_a="sha256:af65fbc0c664691067788fe95ff88760"
          grype_digest_b="b435543e45595eb2ca6f102fc476fbe1"
          grype_image="anchore/grype:v0.110.0@${grype_digest_a}${grype_digest_b}"
          docker_args=(
            --rm
            -e GRYPE_DB_AUTO_UPDATE=true
            -v "$HOME/.cache/grype:/root/.cache/grype"
            -v "$PWD:/work"
            -w /work
            "$grype_image"
          )
          fail_args=(--only-fixed --fail-on "$SECURITY_FAIL_LEVEL")
          docker run "${docker_args[@]}" "dir:frontend" "${fail_args[@]}"
          docker run "${docker_args[@]}" "dir:backend" "${fail_args[@]}"

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Helm
        run: |
          set -euo pipefail
          HELM_VERSION="v3.14.4"
          HELM_TARBALL_URL="https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "${HELM_TARBALL_URL}" -o /tmp/helm.tar.gz
          tar -C /tmp -zxvf /tmp/helm.tar.gz
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Helm lint
        run: helm lint ./helm/sre-simulator

      - name: Helm template
        run: |
          set -euo pipefail
          helm template sre-simulator ./helm/sre-simulator \
            --values ./helm/sre-simulator/values.yaml

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            dockerfile: frontend/Dockerfile
          - component: backend
            dockerfile: backend/Dockerfile
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Build Docker image
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          COMPONENT: ${{ matrix.component }}
        run: >-
          docker build
          --build-arg NPM_VERSION="${NPM_VERSION}"
          -f "${DOCKERFILE}"
          -t "sre-simulator-${COMPONENT}"
          .

  ci-gate:
    if: always()
    needs:
      - lint-typecheck
      - test
      - integration-test
      - integration-test-mssql
      - security
      - helm-validate
      - docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        env:
          LINT_RESULT: ${{ needs.lint-typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          INTEGRATION_RESULT: ${{ needs.integration-test.result }}
          INTEGRATION_MSSQL_RESULT: ${{ needs.integration-test-mssql.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          HELM_RESULT: ${{ needs.helm-validate.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
        run: |
          failed=false
          failed_jobs=()

          echo "CI job results:"
          echo "  lint-typecheck:             ${LINT_RESULT}"
          echo "  test:                       ${TEST_RESULT}"
          echo "  integration-test:           ${INTEGRATION_RESULT}"
          echo "  integration-test-mssql:     ${INTEGRATION_MSSQL_RESULT}"
          echo "  security:                   ${SECURITY_RESULT}"
          echo "  helm-validate:              ${HELM_RESULT}"
          echo "  docker-build:               ${DOCKER_RESULT}"

          for name_result in \
            "lint-typecheck:${LINT_RESULT}" \
            "test:${TEST_RESULT}" \
            "integration-test:${INTEGRATION_RESULT}" \
            "integration-test-mssql:${INTEGRATION_MSSQL_RESULT}" \
            "security:${SECURITY_RESULT}" \
            "helm-validate:${HELM_RESULT}" \
            "docker-build:${DOCKER_RESULT}"; do
            name="${name_result%%:*}"
            result="${name_result#*:}"
            if [[ "$result" != "success" ]]; then
              failed=true
              failed_jobs+=("${name} (${result})")
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo ""
            echo "Failed jobs:"
            for job in "${failed_jobs[@]}"; do
              echo "  - ${job}"
            done
            exit 1
          fi
          echo "All CI jobs passed."

  update-coverage-badge:
    runs-on: ubuntu-latest
    needs:
      - lint-typecheck
      - test
      - integration-test
      - integration-test-mssql
      - security
      - helm-validate
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load npm version
        run: echo "NPM_VERSION=$(tr -d '\n' < .npm-version)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        # v6.3.0
        uses: >-
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Update npm
        run: npm install --global "npm@${NPM_VERSION}"

      - name: Install dependencies
        run: make install

      - name: Run backend tests with coverage
        run: make test

      - name: Generate coverage badge
        run: |
          set -euo pipefail
          coverage_pct="$(node -e '
            const fs = require("fs");
            const data = JSON.parse(
              fs.readFileSync("backend/coverage/coverage-summary.json", "utf8")
            );
            process.stdout.write(String(data.total.lines.pct));
          ')"
          coverage_value="$(printf '%.1f' "$coverage_pct")"
          color="red"
          if awk "BEGIN {exit !($coverage_pct >= 90)}"; then
            color="brightgreen"
          elif awk "BEGIN {exit !($coverage_pct >= 80)}"; then
            color="green"
          elif awk "BEGIN {exit !($coverage_pct >= 70)}"; then
            color="yellowgreen"
          elif awk "BEGIN {exit !($coverage_pct >= 60)}"; then
            color="yellow"
          elif awk "BEGIN {exit !($coverage_pct >= 50)}"; then
            color="orange"
          fi
          mkdir -p badges
          coverage_label="${coverage_value}%25"
          badge_url="https://img.shields.io/badge/coverage-"
          badge_url+="${coverage_label}-${color}.svg"
          curl -fsSL "$badge_url" -o badges/coverage.svg

      - name: Commit updated coverage badge
        run: |
          set -euo pipefail
          if git diff --quiet -- badges/coverage.svg; then
            echo "Coverage badge is already up to date."
            exit 0
          fi
          git add badges/coverage.svg
          git -c user.name="github-actions[bot]" \
            -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "chore(ci): update coverage badge [skip ci]"
          git push origin HEAD:main
