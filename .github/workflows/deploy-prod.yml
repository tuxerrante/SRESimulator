---
name: Deploy Production

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: Semver tag to deploy (example v0.1.0)
        required: true
        type: string
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  checks: read
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  resolve-release-tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_sha: ${{ steps.resolve.outputs.release_sha }}
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve semver tag for release SHA
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${INPUT_RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must follow semver: ${INPUT_RELEASE_TAG}"
              exit 1
            fi
            if ! git rev-parse "${INPUT_RELEASE_TAG}" >/dev/null 2>&1; then
              echo "Release tag ${INPUT_RELEASE_TAG} does not exist."
              exit 1
            fi
            release_sha="$(git rev-list -n 1 "${INPUT_RELEASE_TAG}")"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${INPUT_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "release_sha=${release_sha}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t semver_tags < <(
            git tag --points-at "${HEAD_SHA}" | \
              awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ {print}' | \
              sort -V
          )

          if [[ "${#semver_tags[@]}" -eq 0 ]]; then
            echo "No semver tag on release SHA; skipping production deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "release_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag="${semver_tags[${#semver_tags[@]}-1]}"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    needs:
      - resolve-release-tag
    if: needs.resolve-release-tag.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-release-tag.outputs.release_tag }}
      RELEASE_SHA: ${{ needs.resolve-release-tag.outputs.release_sha }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARO_RG: ${{ secrets.ARO_RG }}
      ARO_CLUSTER: ${{ secrets.ARO_CLUSTER }}
      AOAI_RG: ${{ secrets.AOAI_RG }}
      AOAI_ACCOUNT: ${{ secrets.AOAI_ACCOUNT }}
      AOAI_DEPLOYMENT: ${{ secrets.AOAI_DEPLOYMENT }}
      AOAI_DEPLOYMENT_CHAT: ${{ secrets.AOAI_DEPLOYMENT_CHAT }}
      AOAI_DEPLOYMENT_COMMAND: ${{ secrets.AOAI_DEPLOYMENT_COMMAND }}
      AOAI_DEPLOYMENT_SCENARIO: ${{ secrets.AOAI_DEPLOYMENT_SCENARIO }}
      AOAI_DEPLOYMENT_PROBE: ${{ secrets.AOAI_DEPLOYMENT_PROBE }}
      PROD_NAMESPACE: ${{ secrets.PROD_NAMESPACE }}
      E2E_RELEASE: sre-simulator
      NPM_VERSION: "10"
    steps:
      - name: Harden runner
        # v2.16.0
        uses: >-
          step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit

      - name: Checkout
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.resolve-release-tag.outputs.release_sha }}
          fetch-depth: 0

      - name: Azure login
        # v3.0.0
        uses: >-
          azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify tag is semver and latest release
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must follow semver: ${RELEASE_TAG}"
            exit 1
          fi

          git fetch --tags --force
          # Fetch full main history so older semver tags stay deployable.
          git fetch origin main
          if ! git merge-base --is-ancestor "${RELEASE_SHA}" "origin/main"; then
            echo "Refusing deploy: ${RELEASE_TAG} is not from main history."
            exit 1
          fi

          latest_semver_tag="$(
            git tag | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ {print}' | \
              sort -V | tail -n 1
          )"
          if [[ "$RELEASE_TAG" != "$latest_semver_tag" ]]; then
            echo "Refusing deploy: ${RELEASE_TAG} is not latest semver"
            echo "tag (${latest_semver_tag})."
            exit 1
          fi

      - name: Validate required deployment secrets
        run: |
          set -euo pipefail
          missing=()
          for name in \
            AZURE_SUBSCRIPTION_ID ARO_RG ARO_CLUSTER \
            AOAI_RG AOAI_ACCOUNT AOAI_DEPLOYMENT; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Ensure CI gate passed for release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ci_gate_conclusion="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs" \
              --jq '
                .check_runs[] |
                select(.name == "ci-gate") |
                .conclusion
              ' | \
              head -n 1
          )"
          if [[ "${ci_gate_conclusion}" != "success" ]]; then
            echo "CI gate check did not pass for ${RELEASE_TAG}."
            echo "Commit: ${RELEASE_SHA}"
            exit 1
          fi

      - name: Install OpenShift CLI
        run: |
          set -euo pipefail
          oc_url="https://mirror.openshift.com/pub/openshift-v4/clients/ocp/"
          oc_url+="latest/openshift-client-linux.tar.gz"
          curl -fsSL "${oc_url}" \
            -o /tmp/openshift-client-linux.tar.gz
          tar -xzf /tmp/openshift-client-linux.tar.gz -C /tmp oc kubectl
          sudo mv /tmp/oc /tmp/kubectl /usr/local/bin/
          oc version --client

      - name: Install Helm
        run: |
          set -euo pipefail
          HELM_VERSION="v3.14.4"
          HELM_TARBALL_URL="https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "${HELM_TARBALL_URL}" -o /tmp/helm.tar.gz
          tar -C /tmp -zxvf /tmp/helm.tar.gz
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Deploy tagged release to production
        run: |
          set -euo pipefail
          make prod-up-tag TAG="${RELEASE_TAG}"
          make public-exposure-audit NS="${PROD_NAMESPACE:-sre-simulator}"
