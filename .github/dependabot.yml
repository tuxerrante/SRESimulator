---
version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react-runtime:
        patterns:
          - react
          - react-dom
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: vitest
        versions:
          - 4.1.4
      - dependency-name: "@vitest/coverage-v8"
        versions:
          - 4.1.4

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
