apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sre-simulator.fullname" . }}-config
  labels:
    {{- include "sre-simulator.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "{{ .Values.backend.port }}"
  KNOWLEDGE_BASE_DIR: "/app/knowledge_base"
  AI_PROVIDER: "{{ .Values.ai.provider }}"
  AI_MOCK_MODE: "{{ .Values.ai.mockMode }}"
  AI_STRICT_STARTUP: "{{ .Values.ai.strictStartup }}"
  AI_MODEL: "{{ .Values.ai.model }}"
  CLAUDE_MODEL: "{{ .Values.ai.model }}"
  AI_LIVE_PROBE_TOKEN: "{{ .Values.ai.liveProbeToken }}"
  CLOUD_ML_REGION: "{{ .Values.ai.vertex.region }}"
  ANTHROPIC_VERTEX_PROJECT_ID: "{{ .Values.ai.vertex.projectId }}"
  {{- if not .Values.ai.azureOpenai.endpointFromSecret.existingSecretName }}
  AI_AZURE_OPENAI_ENDPOINT: "{{ .Values.ai.azureOpenai.endpoint }}"
  {{- end }}
  AI_AZURE_OPENAI_DEPLOYMENT: "{{ .Values.ai.azureOpenai.deployment }}"
  {{- with .Values.ai.azureOpenai.routeDeployments }}
  {{- if .chat }}
  AI_AZURE_OPENAI_DEPLOYMENT_CHAT: "{{ .chat }}"
  {{- end }}
  {{- if .command }}
  AI_AZURE_OPENAI_DEPLOYMENT_COMMAND: "{{ .command }}"
  {{- end }}
  {{- if .scenario }}
  AI_AZURE_OPENAI_DEPLOYMENT_SCENARIO: "{{ .scenario }}"
  {{- end }}
  {{- if .probe }}
  AI_AZURE_OPENAI_DEPLOYMENT_PROBE: "{{ .probe }}"
  {{- end }}
  {{- end }}
  AI_AZURE_OPENAI_API_VERSION: "{{ .Values.ai.azureOpenai.apiVersion }}"
