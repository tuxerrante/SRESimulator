apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sre-simulator.fullname" . }}-config
  labels:
    {{- include "sre-simulator.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "{{ .Values.backend.port }}"
  KNOWLEDGE_BASE_DIR: "/app/knowledge_base"
  AI_PROVIDER: "{{ .Values.ai.provider }}"
  AI_MOCK_MODE: "{{ .Values.ai.mockMode }}"
  AI_STRICT_STARTUP: "{{ .Values.ai.strictStartup }}"
  CLAUDE_MODEL: "{{ .Values.ai.model }}"
  CLOUD_ML_REGION: "{{ .Values.ai.vertex.region }}"
  ANTHROPIC_VERTEX_PROJECT_ID: "{{ .Values.ai.vertex.projectId }}"
