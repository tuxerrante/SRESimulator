apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sre-simulator.fullname" . }}-backend
  labels:
    {{- include "sre-simulator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sre-simulator.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "sre-simulator.frontend.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "sre-simulator.helmTest.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
