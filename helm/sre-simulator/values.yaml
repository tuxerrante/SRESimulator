---
frontend:
  image:
    repository: ghcr.io/tuxerrante/sre-simulator-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  service:
    # Default stays internal. AKS enables this block and binds the service to
    # the reserved Azure public IP.
    public:
      annotations: {}
      loadBalancerIP: ""
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

backend:
  image:
    repository: ghcr.io/tuxerrante/sre-simulator-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ai:
  provider: vertex
  mockMode: true
  strictStartup: true
  model: claude-sonnet-4@20250514
  liveProbeToken: ""
  vertex:
    region: us-east5
    projectId: ""
    credentials:
      existingSecretName: ""
      key: credentials.json
      mountPath: /var/run/secrets/gcp
  azureOpenai:
    endpoint: ""
    endpointFromSecret:
      existingSecretName: ""
      key: endpoint
    deployment: ""
    routeDeployments:
      chat: ""
      command: ""
      scenario: ""
      probe: ""
    apiVersion: 2024-10-21
    credentials:
      existingSecretName: ""
      key: api-key

exposure:
  # route: OpenShift Route
  # ingress: Kubernetes Ingress
  # publicService: Kubernetes Service type LoadBalancer
  # gateway: Kubernetes Gateway API public edge
  # none: no public edge object
  mode: route
  host: sre-simulator.apps.example.com
  # Optional override. Defaults to https for Route and Gateway, ingress
  # when TLS is enabled, and http for a public Service.
  scheme: ""

route:
  tls:
    termination: edge

# Escape hatch when the externally visible origin is not derivable from the
# chart-managed public edge.
publicOrigin: ""

ingress:
  className: nginx
  path: /
  pathType: Prefix
  annotations: {}
  tls:
    enabled: false
    secretName: ""

gateway:
  className: eg
  tls:
    secretName: sre-simulator-gateway-tls
  certManager:
    clusterIssuer: letsencrypt-azuredns-prod
  envoyProxy:
    name: sre-simulator-public-edge

database:
  enabled: false
  # Full ADO.NET-style connection string stored in a K8s Secret.
  # Format: Server=<fqdn>;Database=sresimulator;User Id=sresimadmin;Password=<pwd>;Encrypt=true
  existingSecretName: ""
  secretConnectionStringKey: "connection-string"

storage:
  enabled: true
  storageClass: azurefile-csi
  size: 1Gi

imagePullSecrets: []
