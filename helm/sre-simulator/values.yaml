---
frontend:
  image:
    repository: ghcr.io/tuxerrante/sre-simulator-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

backend:
  image:
    repository: ghcr.io/tuxerrante/sre-simulator-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ai:
  provider: vertex
  mockMode: true
  strictStartup: true
  model: claude-sonnet-4@20250514
  liveProbeToken: ""
  vertex:
    region: us-east5
    projectId: ""
    credentials:
      existingSecretName: ""
      key: credentials.json
      mountPath: /var/run/secrets/gcp
  azureOpenai:
    endpoint: ""
    endpointFromSecret:
      existingSecretName: ""
      key: endpoint
    deployment: ""
    routeDeployments:
      chat: ""
      command: ""
      scenario: ""
      probe: ""
    apiVersion: 2024-10-21
    credentials:
      existingSecretName: ""
      key: api-key

route:
  enabled: true
  host: sre-simulator.apps.example.com
  tls:
    termination: edge

database:
  enabled: false
  # Full ADO.NET-style connection string stored in a K8s Secret.
  # Format: Server=<fqdn>;Database=sresimulator;User Id=sresimadmin;Password=<pwd>;Encrypt=true
  existingSecretName: ""
  secretConnectionStringKey: "connection-string"

storage:
  enabled: true
  storageClass: azurefile-csi
  size: 1Gi

keyvault:
  name: ""
  tenantId: ""

secrets:
  - CLOUD_ML_REGION
  - ANTHROPIC_VERTEX_PROJECT_ID
